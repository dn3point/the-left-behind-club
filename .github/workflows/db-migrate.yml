name: Database Migrate & Seed

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - migrate
          - seed
          - migrate-and-seed
      skip_fun_questions:
        description: 'Skip fun question generation during seed'
        required: false
        type: boolean
        default: false

jobs:
  db-migrate-seed:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        if: inputs.action == 'migrate' || inputs.action == 'migrate-and-seed'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Applying migrations to production database..."
          for f in supabase/migrations/*.sql; do
            echo "Applying $f..."
            psql "$DATABASE_URL" -f "$f"
          done
          echo "Applying seed.sql..."
          psql "$DATABASE_URL" -f supabase/seed.sql
          echo "✅ Migrations applied"

      - name: Run seed
        if: inputs.action == 'seed' || inputs.action == 'migrate-and-seed'
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKIP_FUN_QUESTIONS: ${{ inputs.skip_fun_questions }}
        run: pnpm db:seed

      - name: Summary
        run: echo "✅ Database action '${{ inputs.action }}' completed successfully"
