name: Database Migrate & Seed

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - migrate
          - seed
          - migrate-and-seed
      skip_fun_questions:
        description: 'Skip fun question generation during seed'
        required: false
        type: boolean
        default: false

jobs:
  db-migrate-seed:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: inputs.action == 'migrate' || inputs.action == 'migrate-and-seed'
        run: supabase link --project-ref spfenefqfnkhfvbxdeuq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        if: inputs.action == 'migrate' || inputs.action == 'migrate-and-seed'
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run seed
        if: inputs.action == 'seed' || inputs.action == 'migrate-and-seed'
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKIP_FUN_QUESTIONS: ${{ inputs.skip_fun_questions }}
        run: pnpm db:seed

      - name: Summary
        run: echo "✅ Database action '${{ inputs.action }}' completed successfully"
